<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Planning des cultes 2027–2028</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* --- 2027 palette : vert forêt profond --- */
    --y27-accent:#2E5E3E;
    --y27-accent-deep:#1D4029;
    --y27-accent-pale:#DFF0E6;
    --y27-sc:#B8460A;
    --y27-sc-pale:#FAE5D8;
    --y27-dej:#4E6B5A;
    --y27-dej-pale:#E3EDE7;

    /* --- 2028 palette : indigo ardoise --- */
    --y28-accent:#3B4F8C;
    --y28-accent-deep:#263571;
    --y28-accent-pale:#E3E8F8;
    --y28-sc:#8C2D55;
    --y28-sc-pale:#F5E0EB;
    --y28-dej:#526680;
    --y28-dej-pale:#E0E8F0;

    /* --- commun --- */
    --cream:#F7F3ED;
    --cream-deep:#EDE5D8;
    --ink:#25231F;
    --ink-soft:#57534C;
    --line:#DDD5C8;
    --white:#FFFFFF;
    --radius:14px;
    --shadow:0 1px 2px rgba(37,35,31,0.06), 0 6px 18px -8px rgba(37,35,31,0.18);

    /* active year vars — switched by JS */
    --accent:var(--y27-accent);
    --accent-deep:var(--y27-accent-deep);
    --accent-pale:var(--y27-accent-pale);
    --sc-col:var(--y27-sc);
    --sc-pale:var(--y27-sc-pale);
    --dej-col:var(--y27-dej);
    --dej-pale:var(--y27-dej-pale);
  }
  body.year-2028{
    --accent:var(--y28-accent);
    --accent-deep:var(--y28-accent-deep);
    --accent-pale:var(--y28-accent-pale);
    --sc-col:var(--y28-sc);
    --sc-pale:var(--y28-sc-pale);
    --dej-col:var(--y28-dej);
    --dej-pale:var(--y28-dej-pale);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Source Sans 3', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
  }
  #root{min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.display{
    font-family:'Fraunces', Georgia, serif;
    font-weight:600;
    letter-spacing:-0.01em;
    color:var(--ink);
  }

  /* ---- Top bar ---- */
  .topbar{
    position:sticky; top:0; z-index:30;
    background:rgba(247,243,237,0.94);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:10px 16px;
    display:flex; align-items:center; gap:10px; flex-wrap:nowrap;
  }
  .brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .brand .mark{
    width:32px;height:32px;border-radius:9px;flex:none;
    background:linear-gradient(155deg, var(--accent), var(--accent-deep));
    display:flex;align-items:center;justify-content:center;
    color:var(--cream);font-family:'Fraunces',serif;font-weight:700;font-size:16px;
    transition:background .4s ease;
  }
  .brand-text{display:flex;flex-direction:column;min-width:0;}
  .brand-text .t1{font-family:'Fraunces',serif;font-weight:600;font-size:15px;line-height:1.15;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand-text .t2{font-size:11px;color:var(--ink-soft);letter-spacing:.02em;}
  .topbar-right{display:flex;align-items:center;gap:7px;flex:none;}

  /* year switcher */
  .year-tabs{display:flex;gap:4px;align-items:center;}
  .year-tab{
    border:1.5px solid var(--line); background:var(--white); color:var(--ink-soft);
    border-radius:999px; padding:5px 12px; font-size:13px; font-weight:700;
    cursor:pointer; font-family:inherit; transition:all .2s ease; white-space:nowrap;
  }
  .year-tab.active{background:var(--accent); border-color:var(--accent); color:var(--white);}
  .year-tab:hover:not(.active){background:var(--accent-pale); border-color:var(--accent);}

  .pill-btn{
    border:1px solid var(--line); background:var(--white); color:var(--ink);
    border-radius:999px; padding:7px 13px; font-size:13px; font-weight:600;
    cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px;
    transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
    white-space:nowrap;
  }
  .pill-btn:hover{box-shadow:var(--shadow); transform:translateY(-1px);}
  .pill-btn:active{transform:translateY(0);}
  .pill-btn.ghost{background:transparent;}
  .pill-btn.admin{background:var(--accent); border-color:var(--accent); color:var(--white);}
  .pill-btn.admin:hover{background:var(--accent-deep);}
  .pill-btn.danger{background:#C0392B; border-color:#C0392B; color:var(--white);}
  .pill-btn.small{padding:5px 11px; font-size:12px;}

  /* ---- Sticky identity bar (who am I) ---- */
  .identity-bar{
    position:sticky; top:52px; z-index:28;
    background:var(--accent-pale);
    border-bottom:1px solid var(--line);
    padding:8px 16px;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .identity-bar .label{font-size:12.5px;color:var(--accent-deep);font-weight:700;white-space:nowrap;}
  select.name-select{
    font-family:inherit; font-size:14px; padding:7px 11px; border-radius:10px;
    border:1.5px solid var(--accent); background:var(--white); color:var(--ink);
    cursor:pointer; max-width:260px; flex:1;
  }
  .you-badge{
    display:inline-flex; align-items:center; gap:8px; background:var(--white);
    border:1px solid var(--line); border-radius:999px; padding:5px 12px 5px 5px;
    font-size:13.5px; font-weight:600; color:var(--accent-deep);
  }
  .you-badge .avatar{
    width:24px;height:24px;border-radius:50%;background:var(--accent);color:var(--white);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Fraunces',serif;
  }
  .you-badge button{
    border:none;background:transparent;color:var(--ink-soft);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;margin-left:4px;
  }
  .admin-banner{
    position:sticky; top:52px; z-index:28;
    background:var(--accent-deep); color:var(--cream); padding:8px 16px;
    font-size:13px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .admin-banner b{font-weight:700;}

  /* ---- Month nav bar ---- */
  .month-nav{
    background:var(--white); border-bottom:1px solid var(--line);
    padding:8px 16px; overflow-x:auto; white-space:nowrap;
    display:flex; gap:6px; align-items:center;
    scrollbar-width:none;
  }
  .month-nav::-webkit-scrollbar{display:none;}
  .month-btn{
    border:1px solid var(--line); background:transparent; color:var(--ink-soft);
    border-radius:999px; padding:5px 13px; font-size:12.5px; font-weight:600;
    cursor:pointer; font-family:inherit; white-space:nowrap; flex:none;
    transition:all .18s ease;
  }
  .month-btn:hover{background:var(--accent-pale); color:var(--accent-deep); border-color:var(--accent);}
  .month-btn.active-month{background:var(--accent); color:var(--white); border-color:var(--accent);}

  /* ---- Main content ---- */
  .main{flex:1; padding:16px 16px 90px; max-width:940px; margin:0 auto; width:100%;}

  .legend-row{
    display:flex; gap:14px; flex-wrap:wrap; margin-bottom:16px; padding:0 2px;
  }
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

  .month-section{margin-bottom:8px;}
  .month-header{
    font-family:'Fraunces', serif; font-size:21px; font-weight:600; color:var(--accent-deep);
    margin:28px 0 12px; display:flex; align-items:baseline; gap:10px;
  }
  .month-header:first-child{margin-top:4px;}
  .month-header .count{font-family:'Source Sans 3',sans-serif; font-size:12px; font-weight:600; color:var(--ink-soft); background:var(--cream-deep); padding:3px 9px; border-radius:999px;}

  /* ---- Card ---- */
  .card{
    background:var(--white); border-radius:var(--radius); border:1px solid var(--line);
    margin-bottom:12px; overflow:hidden; box-shadow:var(--shadow);
    display:flex; position:relative;
  }
  .card .stripe{width:5px; flex:none;}
  .stripe.sc{background:var(--sc-col);}
  .stripe.normal{background:var(--accent);}
  .stripe.dej{background:var(--dej-col);}
  .card-body{flex:1; padding:13px 15px 14px; min-width:0;}

  .card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .date-block{display:flex; flex-direction:column;}
  .date-main{font-family:'Fraunces',serif; font-size:16.5px; font-weight:600; color:var(--ink);}
  .date-sub{font-size:11.5px; color:var(--ink-soft); margin-top:1px;}
  .type-badge{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    padding:4px 9px; border-radius:999px; flex:none; white-space:nowrap;
  }
  .type-badge.sc{background:var(--sc-pale); color:var(--sc-col);}
  .type-badge.dej{background:var(--dej-pale); color:var(--dej-col);}
  .type-badge.normal{background:var(--accent-pale); color:var(--accent-deep);}

  .remark{
    font-size:12px; color:var(--sc-col); background:var(--sc-pale);
    border-radius:8px; padding:5px 10px; margin-bottom:9px; font-weight:600;
  }
  .remark-admin{
    font-size:12px; color:var(--accent-deep); background:var(--accent-pale);
    border-radius:8px; padding:5px 10px; margin-bottom:9px; font-weight:600;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }

  .slots{display:flex; flex-direction:column; gap:6px;}
  .slot-group-title{
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft); margin:8px 0 2px;
  }
  .slot-group-title:first-child{margin-top:0;}

  .slot{
    display:flex; align-items:center; gap:10px; padding:8px 10px;
    border-radius:10px; background:var(--cream); border:1px solid transparent;
    transition:background .15s ease;
  }
  .slot .slot-label{font-size:12px; color:var(--ink-soft); width:130px; flex:none; font-weight:600;}
  .slot .slot-value{flex:1; min-width:0; font-size:13.5px; font-weight:600; color:var(--ink);}
  .slot.empty .slot-value{color:#B7AE9C; font-weight:500; font-style:italic;}
  .slot.locked{background:var(--cream-deep);}
  .slot.mine{background:var(--accent-pale); border-color:var(--accent);}

  .slot-action{flex:none;}
  .btn-take{
    font-family:inherit; font-size:12px; font-weight:700; border-radius:999px;
    padding:5px 11px; border:1.5px solid var(--accent); background:var(--white); color:var(--accent);
    cursor:pointer; white-space:nowrap; transition:background .15s ease, color .15s ease;
  }
  .btn-take:hover{background:var(--accent); color:var(--white);}
  .btn-take:disabled{opacity:.35; cursor:not-allowed; border-color:var(--line); color:var(--ink-soft);}
  .btn-clear{
    font-family:inherit; font-size:11px; font-weight:700; border-radius:999px;
    padding:4px 10px; border:1.5px solid var(--sc-col); background:transparent; color:var(--sc-col);
    cursor:pointer; white-space:nowrap; transition:background .15s ease, color .15s ease;
  }
  .btn-clear:hover{background:var(--sc-col); color:var(--white);}
  .lock-icon{font-size:13px; color:var(--ink-soft); flex:none;}

  /* ---- Modals ---- */
  .empty-state{text-align:center; padding:60px 20px; color:var(--ink-soft);}
  .empty-state .display{font-size:20px; margin-bottom:6px;}

  .overlay{
    position:fixed; inset:0; background:rgba(25,22,18,0.5); z-index:60;
    display:flex; align-items:center; justify-content:center; padding:16px;
    overflow-y:auto;
  }
  .modal{
    background:var(--white); border-radius:18px; max-width:440px; width:100%;
    padding:24px 22px 20px; box-shadow:0 20px 60px -10px rgba(0,0,0,.35);
    max-height:90vh; overflow-y:auto;
    margin:auto;
  }
  .modal h2{font-size:19px; margin:0 0 6px;}
  .modal p{font-size:13px; color:var(--ink-soft); margin:0 0 14px; line-height:1.5;}
  .modal input[type=text],.modal input[type=password],.modal textarea,.modal select.field-select{
    width:100%; font-family:inherit; font-size:14px; padding:10px 12px; border-radius:10px;
    border:1.5px solid var(--line); margin-bottom:10px; background:var(--cream);
    color:var(--ink);
  }
  .modal input:focus,.modal textarea:focus,.modal select.field-select:focus{outline:none; border-color:var(--accent);}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:8px; flex-wrap:wrap;}
  .err-msg{font-size:12px; color:#C0392B; margin:-4px 0 8px; font-weight:600;}

  .modal-wide{max-width:560px;}
  .modal-header-row{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:6px;}
  .modal-header-row h2{margin:0;}

  .field-label{display:block; font-size:11.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; margin:12px 0 5px;}
  .field-label:first-of-type{margin-top:2px;}

  .perm-list{display:flex; flex-direction:column; gap:7px; margin-bottom:6px;}
  .perm-row{display:flex; align-items:center; gap:9px; font-size:13.5px; color:var(--ink); cursor:pointer; padding:3px 0;}
  .perm-row input[type=checkbox]{width:auto; margin:0; accent-color:var(--accent); flex:none; width:16px; height:16px;}

  .person-list{max-height:45vh; overflow-y:auto; display:flex; flex-direction:column; gap:5px; margin:4px 0 14px; padding-right:2px;}
  .person-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 12px; border-radius:10px; background:var(--cream); border:1px solid var(--line);
  }
  .person-name{font-weight:700; font-size:13.5px; color:var(--ink);}
  .person-meta{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .person-deleted{opacity:0.5; text-decoration:line-through;}

  .person-actions{display:flex;gap:6px;align-items:center;flex:none;}

  .admin-select{
    font-family:inherit; font-size:12.5px; padding:4px 7px; border-radius:8px; border:1px solid var(--line);
    background:var(--white); max-width:170px;
  }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--cream); padding:10px 20px; border-radius:999px;
    font-size:13px; font-weight:600; z-index:80; box-shadow:0 10px 30px -8px rgba(0,0,0,.4);
    animation:rise .25s ease; pointer-events:none;
  }
  @keyframes rise{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

  .footer-note{text-align:center; font-size:11px; color:var(--ink-soft); padding:16px 16px 26px;}

  /* ---- Rubriques custom admin ---- */
  .rubrique-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
  .rubrique-row{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:7px 10px;border-radius:9px;background:var(--cream);border:1px solid var(--line);
  }
  .rubrique-info{font-size:13px;font-weight:600;color:var(--ink);}
  .rubrique-meta{font-size:11px;color:var(--ink-soft);}

  /* ---- section-anchor pour le scroll vers le mois ---- */
  .month-anchor{display:block;height:0;overflow:hidden;}

  @media (max-width:480px){
    .slot{flex-wrap:wrap;}
    .slot .slot-label{width:100%;}
    .brand-text .t2{display:none;}
    .topbar{padding:8px 12px;}
    .identity-bar{top:48px;}
    .admin-banner{top:48px;}
  }
</style>
</head>

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
  var cfg = window.__FIREBASE_CONFIG__;
  if (!cfg || cfg.apiKey === "REMPLACER_PAR_VOTRE_API_KEY") {
    window.__FIREBASE_CONFIG_MISSING__ = true;
    window.dispatchEvent(new Event('firebase-ready'));
  } else {
    var app = initializeApp(cfg);
    window.__FIRESTORE_DB__ = getFirestore(app);
    window.__FIRESTORE_DOC__ = doc;
    window.__FIRESTORE_ON_SNAPSHOT__ = onSnapshot;
    window.__FIRESTORE_SET_DOC__ = setDoc;
    window.__FIREBASE_READY__ = true;
    window.dispatchEvent(new Event('firebase-ready'));
  }
</script>
<script>
(function(){
  "use strict";

  var PLANNING = {
    2027: JSON.parse(document.getElementById('planning-2027').textContent),
    2028: JSON.parse(document.getElementById('planning-2028').textContent)
  };
  var INTERVENANTS_BASE = window.__INTERVENANTS__;
  var ADMIN_CODE = window.__ADMIN_CODE__;

  // =============================================
  // RUBRIQUES FIXES + DYNAMIQUES
  // =============================================
  // Les rubriques de base sont toujours présentes.
  // L'admin peut créer des rubriques supplémentaires
  // stockées dans Firebase (document config).
  // Une rubrique perso : { key, label, perm, group (null|'UNION'|'BAPTISTE'), scOnly (bool), commonGroups (bool) }

  var BASE_PERM_FIELDS = [
    'predication','presidenceCulte','presidenceSainteCene',
    'distributionSainteCene','collecteOffrandes','accueil'
  ];
  var BASE_PERM_LABELS = {
    predication:'Prédicateur',
    presidenceCulte:'Président du culte',
    presidenceSainteCene:'Président Sainte-Cène',
    distributionSainteCene:'Distribution Sainte-Cène',
    collecteOffrandes:'Collecte offrandes',
    accueil:'Accueil'
  };

  // Retourne toutes les PERM_FIELDS en incluant les rubriques custom
  function getAllPermFields(){
    var fields = BASE_PERM_FIELDS.slice();
    (state.customRubriques||[]).forEach(function(r){ if(fields.indexOf(r.perm)<0) fields.push(r.perm); });
    return fields;
  }
  function getAllPermLabels(){
    var labels = Object.assign({}, BASE_PERM_LABELS);
    (state.customRubriques||[]).forEach(function(r){ labels[r.perm] = r.label; });
    return labels;
  }

  // Slot definitions built dynamically
  function getSlotDefs(row){
    var defs = [
      {key:'predicateur',        label:'Prédicateur',              perm:'predication',           group:null},
      {key:'presidentCulte',     label:'Président du culte',       perm:'presidenceCulte',        group:null},
      {key:'accueil1',           label:'Accueil 1',                perm:'accueil',                group:null},
      {key:'accueil2',           label:'Accueil 2',                perm:'accueil',                group:null},
      {key:'accueil3',           label:'Accueil 3',                perm:'accueil',                group:null},
      {key:'accueil4',           label:'Accueil 4',                perm:'accueil',                group:null},
    ];
    if(row.hasSainteCene){
      defs.push({key:'presidentSainteCene',label:'Président Sainte-Cène',perm:'presidenceSainteCene',group:null,scOnly:true});
      defs.push({key:'unionDist1',  label:'Distributeur SC 1',perm:'distributionSainteCene',group:'UNION',scOnly:true});
      defs.push({key:'unionDist2',  label:'Distributeur SC 2',perm:'distributionSainteCene',group:'UNION',scOnly:true});
      defs.push({key:'baptisteDist1',label:'Distributeur SC 1',perm:'distributionSainteCene',group:'BAPTISTE',scOnly:true});
      defs.push({key:'baptisteDist2',label:'Distributeur SC 2',perm:'distributionSainteCene',group:'BAPTISTE',scOnly:true});
    }
    defs.push({key:'unionCollecte1',   label:'Collecte offrandes 1',perm:'collecteOffrandes',group:'UNION'});
    defs.push({key:'unionCollecte2',   label:'Collecte offrandes 2',perm:'collecteOffrandes',group:'UNION'});
    defs.push({key:'baptisteCollecte1',label:'Collecte offrandes 1',perm:'collecteOffrandes',group:'BAPTISTE'});
    defs.push({key:'baptisteCollecte2',label:'Collecte offrandes 2',perm:'collecteOffrandes',group:'BAPTISTE'});

    // Rubriques custom
    (state.customRubriques||[]).forEach(function(r){
      if(r.scOnly && !row.hasSainteCene) return;
      defs.push({
        key: r.key+'_1', label: r.label+' 1', perm: r.perm,
        group: r.group||null, scOnly:!!r.scOnly, customRubrique:true
      });
      defs.push({
        key: r.key+'_2', label: r.label+' 2', perm: r.perm,
        group: r.group||null, scOnly:!!r.scOnly, customRubrique:true
      });
    });

    return defs;
  }

  // =============================================
  // STATE
  // =============================================
  var state = {
    year: 2027,
    overrides: {2027:{}, 2028:{}},
    intervenantsOverrides: {},   // nom -> objet (ajouts admin, y.c. supprimés)
    customRubriques: [],         // rubriques créées par l'admin
    scOverrides: {},             // rowId -> bool (forcer ou retirer la SC)
    currentUser: null,
    isAdmin: false,
    loading: true,
    configMissing: false,
    toast: null,
    showLoginAdmin: false,
    adminCodeInput: '',
    adminError: '',
    // Modals
    showManageIntervenants: false,
    showManageRubriques: false,
    managePersonEditing: null,
    manageForm: null,
    manageRubriqueEditing: null,
    manageRubriqueForm: null,
    // invité modal
    showGuestModal: false,
    guestTarget: null, // {rowId, fieldKey, label}
    guestName: '',
    // Remarque admin
    showRemarqueModal: false,
    remarqueTarget: null, // rowId
    remarqueText: '',
    showHelp: false,
    helpTab: 'intervenants'
  };

  // =============================================
  // FIREBASE PERSISTENCE
  // =============================================
  var db, fsDoc, fsOnSnapshot, fsSetDoc;
  var DOC_OVERRIDES_27, DOC_OVERRIDES_28, DOC_INTERVENANTS, DOC_CONFIG;

  function loadOverrides(){
    db = window.__FIRESTORE_DB__;
    fsDoc = window.__FIRESTORE_DOC__;
    fsOnSnapshot = window.__FIRESTORE_ON_SNAPSHOT__;
    fsSetDoc = window.__FIRESTORE_SET_DOC__;

    DOC_OVERRIDES_27 = fsDoc(db,'planning_culte_2027','overrides');
    DOC_OVERRIDES_28 = fsDoc(db,'planning_culte_2027','overrides_2028');
    DOC_INTERVENANTS = fsDoc(db,'planning_culte_2027','intervenants');
    DOC_CONFIG       = fsDoc(db,'planning_culte_2027','config');

    function listen(docRef, cb){
      fsOnSnapshot(docRef, function(snap){
        var val = (snap.exists() && snap.data() && snap.data().value) ? JSON.parse(snap.data().value) : null;
        cb(val);
        state.loading = false;
        render();
      }, function(err){ console.error(err); state.loading=false; render(); });
    }

    listen(DOC_OVERRIDES_27, function(v){ state.overrides[2027] = v||{}; });
    listen(DOC_OVERRIDES_28, function(v){ state.overrides[2028] = v||{}; });
    listen(DOC_INTERVENANTS, function(v){
      var parsed = v||{};
      state.intervenantsOverrides = parsed.people || parsed || {};
      // handle old format
      if(!state.intervenantsOverrides || typeof state.intervenantsOverrides !== 'object') state.intervenantsOverrides = {};
    });
    listen(DOC_CONFIG, function(v){
      var cfg = v||{};
      state.customRubriques = cfg.rubriques||[];
      state.scOverrides = cfg.scOverrides||{};
    });
  }

  async function saveOverrides(year){
    try{
      var docRef = year===2027 ? DOC_OVERRIDES_27 : DOC_OVERRIDES_28;
      await fsSetDoc(docRef, {value: JSON.stringify(state.overrides[year])});
    }catch(e){ console.error(e); showToast("Connexion impossible, réessayez."); }
  }

  async function saveIntervenants(){
    try{
      await fsSetDoc(DOC_INTERVENANTS, {value: JSON.stringify({people: state.intervenantsOverrides})});
    }catch(e){ console.error(e); showToast("Connexion impossible."); }
  }

  async function saveConfig(){
    try{
      await fsSetDoc(DOC_CONFIG, {value: JSON.stringify({rubriques: state.customRubriques, scOverrides: state.scOverrides})});
    }catch(e){ console.error(e); showToast("Connexion impossible."); }
  }

  // =============================================
  // INTERVENANTS
  // =============================================
  function getEffectiveIntervenants(){
    var byNom = {};
    INTERVENANTS_BASE.forEach(function(p){ byNom[p.nom] = Object.assign({},p,{_base:true}); });
    var ov = state.intervenantsOverrides||{};
    Object.keys(ov).forEach(function(nom){
      byNom[nom] = Object.assign({}, byNom[nom]||{}, ov[nom]);
    });
    // Filter out deleted (but keep for admin view)
    return Object.values(byNom);
  }

  function getActiveIntervenants(){
    return getEffectiveIntervenants().filter(function(p){ return !p._deleted; });
  }

  function getNamesSorted(includeDeleted){
    var list = includeDeleted ? getEffectiveIntervenants() : getActiveIntervenants();
    return list.map(function(p){return p.nom;}).sort(function(a,b){
      return a.localeCompare(b,'fr',{sensitivity:'base'});
    });
  }

  function byName(nom){
    var list = getEffectiveIntervenants();
    for(var i=0;i<list.length;i++){ if(list[i].nom===nom) return list[i]; }
    return null;
  }

  function getRowPlanning(row){
    // Apply SC override
    var hasSC = row.hasSainteCene;
    if(Object.prototype.hasOwnProperty.call(state.scOverrides, row.id)){
      hasSC = !!state.scOverrides[row.id];
    }
    return Object.assign({}, row, {hasSainteCene: hasSC, typeCulte: hasSC ? 'Sainte-Cène' : row.typeCulte});
  }

  function getEffectiveValue(row, fieldKey){
    var ov = (state.overrides[state.year]||{})[row.id];
    if(ov && Object.prototype.hasOwnProperty.call(ov, fieldKey)){
      return ov[fieldKey];
    }
    return row[fieldKey]||null;
  }

  // =============================================
  // ACTIONS
  // =============================================
  function showToast(msg){
    state.toast = msg;
    render();
    setTimeout(function(){ state.toast=null; render(); }, 2600);
  }

  function takeSlot(rowId, fieldKey, label, guestName){
    if(!state.currentUser){ showToast("Choisissez d'abord votre nom en haut de page."); return; }
    var val = guestName ? ('Invité : '+guestName) : state.currentUser;
    if(!state.overrides[state.year][rowId]) state.overrides[state.year][rowId]={};
    state.overrides[state.year][rowId][fieldKey] = val;
    // If guest, auto-fill remarque
    if(guestName){
      if(!state.overrides[state.year][rowId].__remarque){
        state.overrides[state.year][rowId].__remarque = 'Invité : '+guestName;
      }
    }
    saveOverrides(state.year);
    showToast("Inscrit comme "+label+".");
    render();
  }

  function releaseSlot(rowId, fieldKey, currentValue){
    if(!state.currentUser || currentValue !== state.currentUser) return;
    if(!state.overrides[state.year][rowId]) state.overrides[state.year][rowId]={};
    state.overrides[state.year][rowId][fieldKey] = null;
    saveOverrides(state.year);
    showToast("Votre inscription a été retirée.");
    render();
  }

  function adminSetSlot(rowId, fieldKey, value){
    if(!state.overrides[state.year][rowId]) state.overrides[state.year][rowId]={};
    state.overrides[state.year][rowId][fieldKey] = value||null;
    saveOverrides(state.year);
    showToast(value ? "Inscription mise à jour." : "Case libérée.");
    render();
  }

  function adminSetRemarque(rowId, text){
    if(!state.overrides[state.year][rowId]) state.overrides[state.year][rowId]={};
    state.overrides[state.year][rowId].__remarque = text||null;
    saveOverrides(state.year);
    showToast("Remarque enregistrée.");
  }

  function adminToggleSC(rowId, currentHasSC){
    state.scOverrides[rowId] = !currentHasSC;
    saveConfig();
    showToast((!currentHasSC) ? "Sainte-Cène activée pour ce dimanche." : "Sainte-Cène retirée pour ce dimanche.");
    render();
  }

  function tryAdminLogin(){
    if(state.adminCodeInput.trim()===ADMIN_CODE){
      state.isAdmin=true; state.showLoginAdmin=false; state.adminCodeInput=''; state.adminError='';
      render();
    } else {
      state.adminError='Code incorrect.'; render();
    }
  }

  // =============================================
  // GESTION INTERVENANTS
  // =============================================
  function openNewPersonForm(){
    state.managePersonEditing='__new__';
    var f = {nom:'', groupe:'UNION', _deleted:false};
    getAllPermFields().forEach(function(p){ f[p]=false; });
    state.manageForm=f;
    render();
  }
  function openEditPersonForm(nom){
    var p=byName(nom); if(!p) return;
    state.managePersonEditing=nom;
    var f = {nom:p.nom, groupe:p.groupe, _deleted:!!p._deleted};
    getAllPermFields().forEach(function(pf){ f[pf]=!!p[pf]; });
    state.manageForm=f;
    render();
  }
  function closePersonForm(){ state.managePersonEditing=null; state.manageForm=null; render(); }

  function savePersonForm(){
    var f=state.manageForm;
    var nom=(f.nom||'').trim();
    if(!nom){ showToast("Merci de saisir un nom."); return; }
    var isNew=state.managePersonEditing==='__new__';
    if(isNew && byName(nom)){ showToast("Ce nom existe déjà."); return; }
    var record={nom:nom, groupe:f.groupe, _deleted:!!f._deleted};
    getAllPermFields().forEach(function(p){ record[p]=!!f[p]; });
    if(!state.intervenantsOverrides) state.intervenantsOverrides={};
    state.intervenantsOverrides[nom]=record;
    saveIntervenants();
    showToast(isNew ? "Intervenant ajouté." : "Modifications enregistrées.");
    closePersonForm();
  }

  function deletePerson(nom){
    if(!state.intervenantsOverrides) state.intervenantsOverrides={};
    var p=byName(nom)||{};
    var record=Object.assign({},p,{nom:nom,_deleted:true});
    state.intervenantsOverrides[nom]=record;
    saveIntervenants();
    showToast("Intervenant supprimé de la liste (inscriptions conservées).");
    render();
  }

  function restorePerson(nom){
    if(state.intervenantsOverrides && state.intervenantsOverrides[nom]){
      state.intervenantsOverrides[nom]._deleted=false;
      saveIntervenants();
      showToast("Intervenant restauré.");
      render();
    }
  }

  // =============================================
  // GESTION RUBRIQUES
  // =============================================
  function openNewRubriqueForm(){
    state.manageRubriqueEditing='__new__';
    state.manageRubriqueForm={label:'',perm:'',group:null,scOnly:false};
    render();
  }
  function openEditRubriqueForm(idx){
    state.manageRubriqueEditing=idx;
    var r=state.customRubriques[idx];
    state.manageRubriqueForm=Object.assign({},r);
    render();
  }
  function closeRubriqueForm(){ state.manageRubriqueEditing=null; state.manageRubriqueForm=null; render(); }
  function saveRubriqueForm(){
    var f=state.manageRubriqueForm;
    var label=(f.label||'').trim();
    if(!label){ showToast("Donnez un nom à la rubrique."); return; }
    var perm = label.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_');
    var key = perm+'_custom';
    var isNew=state.manageRubriqueEditing==='__new__';
    var record={key:key, label:label, perm:perm, group:f.group||null, scOnly:!!f.scOnly};
    if(isNew){
      state.customRubriques.push(record);
    } else {
      state.customRubriques[state.manageRubriqueEditing]=record;
    }
    saveConfig();
    showToast(isNew ? "Rubrique créée." : "Rubrique modifiée.");
    closeRubriqueForm();
  }
  function deleteRubrique(idx){
    state.customRubriques.splice(idx,1);
    saveConfig();
    showToast("Rubrique supprimée.");
    render();
  }

  // =============================================
  // RENDER HELPERS
  // =============================================
  function el(tag,attrs,children){
    var node=document.createElement(tag);
    attrs=attrs||{};
    Object.keys(attrs).forEach(function(k){
      var v=attrs[k];
      if(v==null) return;
      if(k==='class') node.className=v;
      else if(k==='html') node.innerHTML=v;
      else if(k.indexOf('on')===0 && typeof v==='function') node.addEventListener(k.slice(2),v);
      else if(k==='disabled'){ if(v) node.setAttribute('disabled','disabled'); }
      else if(k==='checked'){ node.checked=!!v; }
      else if(k==='selected'){ if(v) node.setAttribute('selected','selected'); }
      else if(k==='style') node.setAttribute('style',v);
      else node.setAttribute(k,v);
    });
    (children||[]).forEach(function(c){
      if(c==null) return;
      if(typeof c==='string') node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    });
    return node;
  }

  function renderTopbar(){
    var yearBtns = [2027,2028].map(function(y){
      return el('button',{class:'year-tab'+(state.year===y?' active':''), onclick:function(){
        state.year=y;
        document.body.className=y===2028?'year-2028':'';
        render();
      }},[y+'']);
    });
    var adminBtns=[];
    if(state.isAdmin){
      adminBtns.push(el('button',{class:'pill-btn small',onclick:function(){ state.showManageIntervenants=true; render(); }},['Intervenants']));
      adminBtns.push(el('button',{class:'pill-btn small',onclick:function(){ state.showManageRubriques=true; render(); }},['Rubriques']));
      adminBtns.push(el('button',{class:'pill-btn ghost small',onclick:function(){ state.isAdmin=false; render(); }},['Quitter admin']));
    } else {
      adminBtns.push(el('button',{class:'pill-btn ghost small',onclick:function(){ state.showLoginAdmin=true; state.adminError=''; render(); }},['Administrateur']));
    }
    return el('div',{class:'topbar'},[
      el('div',{class:'brand'},[
        el('div',{class:'mark'},['✝']),
        el('div',{class:'brand-text'},[
          el('span',{class:'t1'},['Planning des cultes '+(state.year===2027?'2027':'2028')]),
          el('span',{class:'t2'},['Église Baptiste & Union — Roubaix'])
        ])
      ]),
      el('div',{class:'topbar-right'},[
        el('button',{class:'pill-btn ghost small',onclick:function(){ state.showHelp=true; state.helpTab=state.isAdmin?'admin':'intervenants'; render(); }},['? Aide']),
        el('div',{class:'year-tabs'},yearBtns),
        ...adminBtns
      ])
    ]);
  }

  function renderIdentityBar(){
    if(state.isAdmin){
      return el('div',{class:'admin-banner'},[
        el('span',{},[el('b',{},['Mode administrateur']), ' — modifiez ou libérez n\u2019importe quelle case.'])
      ]);
    }
    if(state.currentUser){
      var initials=state.currentUser.split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
      return el('div',{class:'identity-bar'},[
        el('span',{class:'label'},['Vous êtes :']),
        el('span',{class:'you-badge'},[
          el('span',{class:'avatar'},[initials]),
          state.currentUser,
          el('button',{title:'Changer',onclick:function(){ state.currentUser=null; render(); }},['✕'])
        ])
      ]);
    }
    var names = getNamesSorted(false);
    var select=el('select',{class:'name-select',onchange:function(e){
      state.currentUser=e.target.value||null;
      render();
    }},[el('option',{value:''},['\u2014 Choisissez votre nom \u2014'])].concat(
      names.map(function(n){ return el('option',{value:n},[n]); })
    ));
    return el('div',{class:'identity-bar'},[
      el('span',{class:'label'},['Qui êtes-vous ?']),
      select
    ]);
  }

  function renderMonthNav(){
    var months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    var btns=months.map(function(m,idx){
      return el('button',{class:'month-btn',onclick:function(){
        var anchor=document.getElementById('month-anchor-'+idx);
        if(anchor){
          var offset=anchor.getBoundingClientRect().top+window.pageYOffset-120;
          window.scrollTo({top:offset,behavior:'smooth'});
        }
      }},[m]);
    });
    return el('div',{class:'month-nav'},btns);
  }

  function dateFR(iso){
    var d=new Date(iso+'T00:00:00');
    var days=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    var months=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    return {
      dayLabel:days[d.getDay()],
      full:d.getDate()+' '+months[d.getMonth()],
      year:d.getFullYear(),
      monthIdx: d.getMonth()
    };
  }

  function cardType(row){
    if(row.hasSainteCene||row.typeCulte==='Sainte-Cène') return {cls:'sc',label:'Sainte-Cène'};
    if(row.typeCulte==='Petit-déjeuner') return {cls:'dej',label:'Petit-déjeuner'};
    return {cls:'normal',label:'Culte'};
  }

  function slotEligible(person, slotDef){
    if(!person) return false;
    if(person._deleted) return false;
    if(!person[slotDef.perm]) return false;
    if(slotDef.group && person.groupe!==slotDef.group) return false;
    return true;
  }

  function renderSlot(row, def){
    var value=getEffectiveValue(row, def.key);
    var rawVal=row[def.key];
    var jeunesLocked=rawVal==='Jeunes';
    var hasValue=value!=null&&value!==''&&value!=='-----';
    var isGuest=hasValue && value.indexOf('Invité')===0;
    var mine=hasValue&&state.currentUser&&value===state.currentUser;
    var slotClasses='slot'+(hasValue?' locked':' empty')+(mine?' mine':'');
    var valueNode=el('span',{class:'slot-value'},[hasValue?value:'À pourvoir']);
    var actionNode;
    if(state.isAdmin){
      var allNames=getNamesSorted(false);
      var sel=el('select',{class:'admin-select',onchange:function(e){
        var v=e.target.value;
        if(v==='__guest__'){
          state.showGuestModal=true;
          state.guestTarget={rowId:row.id,fieldKey:def.key,label:def.label};
          state.guestName='';
          render();
          return;
        }
        adminSetSlot(row.id,def.key,v);
      }},[el('option',{value:''},['— vide —'])]
        .concat(allNames.map(function(n){
          var opt=el('option',{value:n},[n]);
          if(n===value) opt.setAttribute('selected','selected');
          return opt;
        }))
        .concat([el('option',{value:'__guest__',selected:isGuest},['Invité…'])])
      );
      actionNode=sel;
    } else if(jeunesLocked){
      actionNode=el('span',{class:'lock-icon'},['🔒']);
    } else if(hasValue&&mine){
      actionNode=el('button',{class:'btn-clear',onclick:function(){ releaseSlot(row.id,def.key,value); }},['Retirer mon inscription']);
    } else if(hasValue){
      actionNode=el('span',{class:'lock-icon'},['🔒']);
    } else {
      var person=state.currentUser?byName(state.currentUser):null;
      var eligible=slotEligible(person,def);
      var isUserGuest = state.currentUser==='Invité';
      if(isUserGuest){
        actionNode=el('button',{class:'btn-take',onclick:function(){
          state.showGuestModal=true;

  function renderCard(row, occurrence){
    var effRow=getRowPlanning(row);
    var ct=cardType(effRow);
    var d=dateFR(row.date);
    var slotsContainer=el('div',{class:'slots'},[]);
    var defs=getSlotDefs(effRow);

    // Filter defs for scOnly
    var visibleDefs=defs.filter(function(d){ return !d.scOnly || effRow.hasSainteCene; });

    // Group rendering
    var groups=[
      {title:null, keys:['predicateur','presidentCulte','accueil1','accueil2','accueil3','accueil4']},
    ];
    if(effRow.hasSainteCene){
      groups.push({title:'Sainte-Cène', keys:['presidentSainteCene']});
      groups.push({title:'Union — distribution Sainte-Cène', keys:['unionDist1','unionDist2']});
      groups.push({title:'Baptiste — distribution Sainte-Cène', keys:['baptisteDist1','baptisteDist2']});
    }
    groups.push({title:'Union — collecte offrandes', keys:['unionCollecte1','unionCollecte2']});
    groups.push({title:'Baptiste — collecte offrandes', keys:['baptisteCollecte1','baptisteCollecte2']});

    // Add custom rubriques groups
    (state.customRubriques||[]).forEach(function(r){
      if(r.scOnly && !effRow.hasSainteCene) return;
      groups.push({title:r.label + (r.group ? ' — '+r.group : ''), keys:[r.key+'_1', r.key+'_2']});
    });

    var defByKey={};
    visibleDefs.forEach(function(d){ defByKey[d.key]=d; });

    groups.forEach(function(g){
      var hasAny=g.keys.some(function(k){ return defByKey[k]; });
      if(!hasAny) return;
      if(g.title) slotsContainer.appendChild(el('div',{class:'slot-group-title'},[g.title]));
      g.keys.forEach(function(k){
        if(defByKey[k]) slotsContainer.appendChild(renderSlot(effRow, defByKey[k]));
      });
    });

    // Get remarque (admin-set or original)
    var remarque = getEffectiveValue(effRow, '__remarque') || row.remarques;
    var bodyChildren=[];

    var topChildren=[
      el('div',{class:'date-block'},[
        el('span',{class:'date-main'},[d.dayLabel.charAt(0).toUpperCase()+d.dayLabel.slice(1)+' '+d.full]),
        el('span',{class:'date-sub'},[d.year+(row.typeCulte==='Petit-déjeuner'?' · petit-déjeuner partagé':'')+(occurrence>1?' · 2ᵉ intervenant ce jour':'')])
      ]),
      el('div',{style:'display:flex;gap:6px;align-items:center;flex-wrap:wrap;'},[
        el('span',{class:'type-badge '+ct.cls},[ct.label]),
        state.isAdmin ? el('button',{
          class:'pill-btn ghost small',
          title: effRow.hasSainteCene ? 'Retirer la Sainte-Cène ce dimanche' : 'Ajouter la Sainte-Cène ce dimanche',
          onclick:function(e){ e.stopPropagation(); adminToggleSC(row.id, effRow.hasSainteCene); }
        }, [effRow.hasSainteCene ? '✗ SC' : '+ SC']) : null
      ])
    ];
    bodyChildren.push(el('div',{class:'card-top'},topChildren));

    if(remarque){
      var remDiv;
      if(state.isAdmin){
        remDiv=el('div',{class:'remark-admin'},[
          el('span',{},['\uD83D\uDCCB '+remarque]),
          el('button',{class:'pill-btn ghost small',onclick:function(){
            state.showRemarqueModal=true;
            state.remarqueTarget=row.id;
            state.remarqueText=remarque||'';
            render();
          }},['Modifier'])
        ]);
      } else {
        remDiv=el('div',{class:'remark'},['\uD83D\uDCCB '+remarque]);
      }
      bodyChildren.push(remDiv);
    } else if(state.isAdmin){
      bodyChildren.push(el('button',{
        class:'pill-btn ghost small',
        style:'margin-bottom:8px;font-size:11px;',
        onclick:function(){
          state.showRemarqueModal=true;
          state.remarqueTarget=row.id;
          state.remarqueText='';
          render();
        }
      },['+ Ajouter une remarque']));
    }

    bodyChildren.push(slotsContainer);

    return el('div',{class:'card'},[
      el('div',{class:'stripe '+ct.cls}),
      el('div',{class:'card-body'},bodyChildren)
    ]);
  }

  function renderMain(){
    var main=el('div',{class:'main'},[]);
    main.appendChild(el('div',{class:'legend-row'},[
      el('span',{class:'legend-item'},[el('span',{class:'dot',style:'background:var(--sc-col)'}),'\u00a0Sainte-Cène']),
      el('span',{class:'legend-item'},[el('span',{class:'dot',style:'background:var(--accent)'}),'\u00a0Culte']),
      el('span',{class:'legend-item'},[el('span',{class:'dot',style:'background:var(--dej-col)'}),'\u00a0Petit-déjeuner'])
    ]));

    var rows=PLANNING[state.year];
    var lastMonth=null;
    var lastDate=null;
    var dateOcc=0;
    var monthCounts={};
    rows.forEach(function(r){ monthCounts[r.mois]=(monthCounts[r.mois]||0)+1; });

    var MONTHS_ORDER=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    var monthAnchorsRendered={};

    rows.forEach(function(row){
      if(row.date!==lastDate){ dateOcc=1; lastDate=row.date; } else { dateOcc++; }
      if(row.mois!==lastMonth){
        lastMonth=row.mois;
        var mIdx=MONTHS_ORDER.indexOf(row.mois);
        if(!monthAnchorsRendered[mIdx]){
          monthAnchorsRendered[mIdx]=true;
          var anchor=el('div',{id:'month-anchor-'+mIdx,class:'month-anchor'},[]);
          main.appendChild(anchor);
        }
        main.appendChild(el('div',{class:'month-header'},[
          row.mois,
          el('span',{class:'count'},[(monthCounts[row.mois]||0)+' dimanches'])
        ]));
      }
      main.appendChild(renderCard(row,dateOcc));
    });
    return main;
  }

    }

    root.appendChild(renderIdentityBar());
    root.appendChild(renderMonthNav());

    if(state.loading){
      root.appendChild(el('div',{class:'empty-state'},[el('div',{class:'display'},['Chargement du planning…'])]));
    } else {
      root.appendChild(renderMain());
      root.appendChild(el('div',{class:'footer-note'},['Les inscriptions sont synchronisées en temps réel. Chacun peut retirer sa propre inscription ; l\u2019administrateur peut tout modifier.']));
    }

    var modals=[
      renderAdminLoginModal(),
      renderManageIntervenantsModal(),
      renderManageRubriquesModal(),
      renderGuestModal(),
      renderRemarqueModal(),
      renderHelpModal(),
      renderToast()
    ];
    modals.forEach(function(m){ if(m) root.appendChild(m); });
  }

  // =============================================
  // BOOTSTRAP
  // =============================================
  function bootstrapApp(){
    if(window.__FIREBASE_CONFIG_MISSING__){
      state.loading=false; state.configMissing=true; render(); return;
    }
    render();
    loadOverrides();
  }

  var bootstrapped=false;
  function bootstrapOnce(){
    if(bootstrapped) return; bootstrapped=true; bootstrapApp();
  }

  if(window.__FIREBASE_READY__||window.__FIREBASE_CONFIG_MISSING__){
    bootstrapOnce();
  } else {
    window.addEventListener('firebase-ready', bootstrapOnce, {once:true});
    setTimeout(function(){ if(!bootstrapped){ window.__FIREBASE_CONFIG_MISSING__=true; bootstrapOnce(); } },4000);
  }

})();
</script>
</body>
</html>
