<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Planning des cultes 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F2E9;
    --cream-deep:#EFE6D6;
    --ink:#2B2A28;
    --ink-soft:#5B5650;
    --denim:#2E4D5E;
    --denim-deep:#1F3B49;
    --denim-pale:#E4ECEE;
    --terracotta:#C6643E;
    --terracotta-pale:#F4E2D4;
    --sage:#6F8366;
    --sage-pale:#E7EDE3;
    --line:#DCD3C2;
    --white:#FFFFFF;
    --radius:14px;
    --shadow:0 1px 2px rgba(43,42,40,0.06), 0 6px 18px -8px rgba(43,42,40,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Source Sans 3', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
  }
  #root{min-height:100vh;display:flex;flex-direction:column;}

  h1,h2,h3,.display{
    font-family:'Fraunces', Georgia, serif;
    font-weight:600;
    letter-spacing:-0.01em;
    color:var(--ink);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:30;
    background:rgba(247,242,233,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .brand{display:flex; align-items:baseline; gap:10px; min-width:0;}
  .brand .mark{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(155deg, var(--denim), var(--denim-deep));
    display:flex;align-items:center;justify-content:center;
    color:var(--cream); font-family:'Fraunces',serif; font-weight:700; font-size:17px;
    flex:none;
  }
  .brand-text{display:flex;flex-direction:column;min-width:0;}
  .brand-text .t1{font-family:'Fraunces',serif;font-weight:600;font-size:16.5px;line-height:1.15;color:var(--ink);}
  .brand-text .t2{font-size:11.5px;color:var(--ink-soft);letter-spacing:.02em;}
  .topbar-actions{display:flex;align-items:center;gap:8px;flex:none;}

  .pill-btn{
    border:1px solid var(--line); background:var(--white); color:var(--ink);
    border-radius:999px; padding:8px 14px; font-size:13.5px; font-weight:600;
    cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px;
    transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
    white-space:nowrap;
  }
  .pill-btn:hover{box-shadow:var(--shadow); transform:translateY(-1px);}
  .pill-btn:active{transform:translateY(0);}
  .pill-btn.ghost{background:transparent;}
  .pill-btn.admin{background:var(--denim); border-color:var(--denim); color:var(--cream);}
  .pill-btn.admin:hover{background:var(--denim-deep);}

  /* ---------- Who-am-I bar ---------- */
  .whoami{
    position:sticky; top:52px; z-index:29;
    padding:10px 18px; background:var(--denim-pale); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .whoami .label{font-size:13px; color:var(--denim-deep); font-weight:600;}
  select.name-select{
    font-family:inherit; font-size:14.5px; padding:8px 12px; border-radius:10px;
    border:1.5px solid var(--denim); background:var(--white); color:var(--ink);
    cursor:pointer; max-width:260px;
  }
  .whoami .you-badge{
    display:inline-flex; align-items:center; gap:8px; background:var(--white);
    border:1px solid var(--line); border-radius:999px; padding:6px 12px 6px 6px;
    font-size:13.5px; font-weight:600; color:var(--denim-deep);
  }
  .you-badge .avatar{
    width:24px;height:24px;border-radius:50%;background:var(--denim);color:var(--cream);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Fraunces',serif;
  }
  .you-badge button{
    border:none;background:transparent;color:var(--ink-soft);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;
  }

  /* ---------- Main scroll area ---------- */
  .main{flex:1; padding:18px 16px 90px; max-width:920px; margin:0 auto; width:100%;}

  .legend-row{
    display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px; padding:0 2px;
  }
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .month-header{
    font-family:'Fraunces', serif; font-size:22px; font-weight:600; color:var(--denim-deep);
    margin:30px 0 12px; padding-top:6px; display:flex; align-items:baseline; gap:10px;
  }
  .month-header:first-child{margin-top:4px;}
  .month-header .count{font-family:'Source Sans 3',sans-serif; font-size:12.5px; font-weight:600; color:var(--ink-soft); background:var(--cream-deep); padding:3px 9px; border-radius:999px;}

  /* ---------- Sunday Card ---------- */
  .card{
    background:var(--white); border-radius:var(--radius); border:1px solid var(--line);
    margin-bottom:14px; overflow:hidden; box-shadow:var(--shadow);
    display:flex; position:relative;
  }
  .card .stripe{width:6px; flex:none;}
  .stripe.sc{background:var(--terracotta);}
  .stripe.normal{background:var(--denim);}
  .stripe.dej{background:var(--sage);}
  .card-body{flex:1; padding:14px 16px 15px; min-width:0;}

  .card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .date-block{display:flex; flex-direction:column;}
  .date-main{font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:var(--ink);}
  .date-sub{font-size:12px; color:var(--ink-soft); margin-top:1px;}
  .type-badge{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    padding:4px 9px; border-radius:999px; flex:none; white-space:nowrap;
  }
  .type-badge.sc{background:var(--terracotta-pale); color:#8C3F1F;}
  .type-badge.dej{background:var(--sage-pale); color:#3E4F37;}
  .type-badge.normal{background:var(--denim-pale); color:var(--denim-deep);}

  .remark{
    font-size:12.5px; color:var(--terracotta); background:var(--terracotta-pale);
    border-radius:8px; padding:6px 10px; margin-bottom:10px; font-weight:600;
  }

  .slots{display:flex; flex-direction:column; gap:7px;}
  .slot-group-title{
    font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft); margin:9px 0 2px;
  }
  .slot-group-title:first-child{margin-top:0;}

  .slot{
    display:flex; align-items:center; gap:10px; padding:9px 10px;
    border-radius:10px; background:var(--cream); border:1px solid transparent;
    transition:background .15s ease;
  }
  .slot .slot-label{
    font-size:12.5px; color:var(--ink-soft); width:128px; flex:none; font-weight:600;
  }
  .slot .slot-value{flex:1; min-width:0; font-size:14px; font-weight:600; color:var(--ink);}
  .slot.empty .slot-value{color:#B7AE9C; font-weight:500; font-style:italic;}
  .slot.locked{background:var(--cream-deep);}
  .slot.mine{background:var(--denim-pale); border-color:var(--denim);}

  .slot-action{flex:none;}
  .btn-take{
    font-family:inherit; font-size:12.5px; font-weight:700; border-radius:999px;
    padding:6px 12px; border:1.5px solid var(--denim); background:var(--white); color:var(--denim);
    cursor:pointer; white-space:nowrap; transition:background .15s ease, color .15s ease;
  }
  .btn-take:hover{background:var(--denim); color:var(--cream);}
  .btn-take:disabled{opacity:.35; cursor:not-allowed; border-color:var(--line); color:var(--ink-soft);}
  .btn-clear{
    font-family:inherit; font-size:11.5px; font-weight:700; border-radius:999px;
    padding:5px 10px; border:1.5px solid var(--terracotta); background:transparent; color:var(--terracotta);
    cursor:pointer; white-space:nowrap; transition:background .15s ease, color .15s ease;
  }
  .btn-clear:hover{background:var(--terracotta); color:var(--white);}
  .lock-icon{font-size:13px; color:var(--ink-soft); flex:none;}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
  }
  .empty-state .display{font-size:20px; margin-bottom:6px;}

  /* ---------- Admin modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(31,28,22,0.45); z-index:60;
    display:flex; align-items:center; justify-content:center; padding:18px;
  }
  .modal{
    background:var(--white); border-radius:18px; max-width:420px; width:100%;
    padding:26px 24px 22px; box-shadow:0 20px 60px -10px rgba(0,0,0,0.35);
    max-height:90vh; overflow-y:auto;
  }
  .modal h2{font-size:20px; margin:0 0 6px;}
  .modal p{font-size:13.5px; color:var(--ink-soft); margin:0 0 16px; line-height:1.5;}
  .modal input{
    width:100%; font-family:inherit; font-size:15px; padding:11px 13px; border-radius:10px;
    border:1.5px solid var(--line); margin-bottom:12px; background:var(--cream);
  }
  .modal input:focus{outline:none; border-color:var(--denim);}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:6px;}
  .err-msg{font-size:12.5px; color:var(--terracotta); margin:-6px 0 10px; font-weight:600;}

  .modal-wide{max-width:520px;}
  .modal-header-row{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:6px;}
  .modal-header-row h2{margin:0;}
  .pill-btn.small{padding:6px 12px; font-size:12.5px;}

  .field-label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; margin:14px 0 6px;}
  .field-label:first-of-type{margin-top:4px;}

  .perm-list{display:flex; flex-direction:column; gap:8px; margin-bottom:6px;}
  .perm-row{display:flex; align-items:center; gap:10px; font-size:14px; color:var(--ink); cursor:pointer; padding:4px 0;}
  .perm-row input{width:auto; margin:0; accent-color:var(--denim); flex:none; width:17px; height:17px;}

  .person-list{max-height:50vh; overflow-y:auto; display:flex; flex-direction:column; gap:6px; margin:4px 0 16px; padding-right:2px;}
  .person-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 12px; border-radius:10px; background:var(--cream); border:1px solid var(--line);
  }
  .person-name{font-weight:700; font-size:14px; color:var(--ink);}
  .person-meta{font-size:11.5px; color:var(--ink-soft); margin-top:2px;}

  /* admin panel content reuses slot but with select */
  .admin-banner{
    background:var(--denim-deep); color:var(--cream); padding:10px 18px;
    font-size:13px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
  }
  .admin-banner b{font-weight:700;}
  select.admin-select{
    font-family:inherit; font-size:13px; padding:5px 8px; border-radius:8px; border:1px solid var(--line);
    background:var(--white); max-width:160px;
  }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--cream); padding:11px 20px; border-radius:999px;
    font-size:13.5px; font-weight:600; z-index:80; box-shadow:0 10px 30px -8px rgba(0,0,0,.4);
    animation:rise .25s ease;
  }
  @keyframes rise{from{opacity:0; transform:translate(-50%,8px);} to{opacity:1; transform:translate(-50%,0);}}

  .footer-note{
    text-align:center; font-size:11.5px; color:var(--ink-soft); padding:18px 16px 26px;
  }

  @media (max-width:480px){
    .slot{flex-wrap:wrap;}
    .slot .slot-label{width:100%;}
    .brand-text .t2{display:none;}
  }

  /* ---- Barre navigation mois ---- */
  .month-nav{
    background:var(--white); border-bottom:1px solid var(--line);
    padding:7px 16px; overflow-x:auto; white-space:nowrap;
    display:flex; gap:6px; align-items:center; scrollbar-width:none;
    position:sticky; top:104px; z-index:27;
  }
  .month-nav::-webkit-scrollbar{display:none;}
  .month-nav-btn{
    border:1px solid var(--line); background:transparent; color:var(--ink-soft);
    border-radius:999px; padding:4px 13px; font-size:12px; font-weight:600;
    cursor:pointer; font-family:inherit; white-space:nowrap; flex:none;
    transition:all .18s;
  }
  .month-nav-btn:hover{ background:var(--denim-pale); color:var(--denim-deep); border-color:var(--denim); }
  .month-anchor{ display:block; height:0; overflow:hidden; }

</style>

  // intervenantsOverrides: nom -> objet intervenant complet (ajout ou remplacement d'une personne de la base)
  function getEffectiveIntervenants(){
    var byNomBase = {};
    INTERVENANTS_BASE.forEach(function(p){ byNomBase[p.nom] = p; });
    var overrides = state.intervenantsOverrides || {};
    Object.keys(overrides).forEach(function(nom){
      if(nom.indexOf('__deleted__') === 0){
        var orig = nom.slice('__deleted__'.length);
        delete byNomBase[orig];
      } else if(overrides[nom] && overrides[nom].__deleted){
        // ignorer — ne pas ajouter à la liste
      } else if(overrides[nom] && overrides[nom].nom){
        byNomBase[nom] = overrides[nom];
      }
    });
    // Filtrer les entrées sans nom valide
    var result = [];
    Object.keys(byNomBase).forEach(function(nom){
      var p = byNomBase[nom];
      if(p && p.nom && typeof p.nom === 'string') result.push(p);
    });
    return result;
  }

  function getNamesSorted(){
    return getEffectiveIntervenants().map(function(p){return p.nom;}).sort(function(a,b){
      return a.localeCompare(b, 'fr', {sensitivity:'base'});
    });
  }

  function byName(nom){
    var list = getEffectiveIntervenants();
    for(var i=0;i<list.length;i++){ if(list[i].nom===nom) return list[i]; }
    return null;
  }

  // ---- slot definitions: which fields exist on a row, their permission key, and grouping ----
  var SLOT_DEFS = [

    {key:'presidentCulte',     label:'Président du culte',          perm:'presidenceCulte',         group:null},

    {key:'unionDist1',         label:'Distributeur SC 1',           perm:'distributionSainteCene',  group:'UNION', scOnly:true},

    {key:'unionCollecte2',     label:'Collecte offrandes 2',        perm:'collecteOffrandes',       group:'UNION'},

    {key:'baptisteCollecte2',  label:'Collecte offrandes 2',        perm:'collecteOffrandes',       group:'BAPTISTE'}
  ];

  function dateFR(iso){
    var d = new Date(iso+"T00:00:00");
    var days = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    var months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    return {
      dayLabel: days[d.getDay()],
      full: d.getDate()+' '+months[d.getMonth()],
      year: d.getFullYear()
    };
  }

  function cardType(row){
    if(row.typeCulte === 'Sainte-Cène') return {cls:'sc', label:'Sainte-Cène'};
    if(row.typeCulte === 'Petit-déjeuner') return {cls:'dej', label:'Petit-déjeuner'};
    return {cls:'normal', label:'Culte'};
  }

  // =========================================================
  // STATE
  // =========================================================
  var state = {
    overrides: {},              // rowId -> { fieldKey: nameValue }
    intervenantsOverrides: {},  // nom -> objet intervenant (ajouts/modifs admin)
    currentUser: null,  // string or null
    isAdmin: false,
    loading: true,
    configMissing: false,
    toast: null,
    showLoginAdmin: false,
    adminCodeInput: '',
    adminError: '',
    showManageIntervenants: false,
    managePersonEditing: null,   // nom de la personne en cours d'édition, ou '__new__' pour création
    manageForm: null             // brouillon du formulaire en cours
  };

  // =========================================================
  // PERSISTENCE (Firebase Firestore)
  // =========================================================
  // Document unique pour les inscriptions, document unique pour les intervenants ajoutés/modifiés.
  // Initialisés à l'intérieur de loadOverrides() pour garantir que le SDK Firebase
  // (chargé en module, donc de façon asynchrone) est bien prêt avant utilisation.
  var db, fsDoc, fsOnSnapshot, fsSetDoc, OVERRIDES_DOC, INTERVENANTS_DOC;

  function loadOverrides(){
    db = window.__FIRESTORE_DB__;
    fsDoc = window.__FIRESTORE_DOC__;
    fsOnSnapshot = window.__FIRESTORE_ON_SNAPSHOT__;
    fsSetDoc = window.__FIRESTORE_SET_DOC__;
    OVERRIDES_DOC = fsDoc(db, 'planning_culte_2026', 'overrides');
    INTERVENANTS_DOC = fsDoc(db, 'planning_culte_2026', 'intervenants');

    // Écoute en temps réel : toute modification faite par quelqu'un d'autre
    // met à jour l'écran de tout le monde automatiquement, sans recharger la page.
    fsOnSnapshot(OVERRIDES_DOC, function(snap){
      state.overrides = (snap.exists() && snap.data() && snap.data().value) ? JSON.parse(snap.data().value) : {};
      state.loading = false;
      render();
    }, function(err){
      console.error(err);
      state.loading = false;
      showToast("Connexion à la base de données impossible.");
      render();
    });

    fsOnSnapshot(INTERVENANTS_DOC, function(snap){
      state.intervenantsOverrides = (snap.exists() && snap.data() && snap.data().value) ? JSON.parse(snap.data().value) : {};
      render();
    }, function(err){
      console.error(err);
    });
  }

  async function saveOverrides(){
    try{
      await fsSetDoc(OVERRIDES_DOC, { value: JSON.stringify(state.overrides) });
    }catch(e){
      console.error(e);
      showToast("Connexion impossible, réessayez.");
    }
  }

  async function saveIntervenantsOverrides(){
    try{
      await fsSetDoc(INTERVENANTS_DOC, { value: JSON.stringify(state.intervenantsOverrides) });
    }catch(e){
      console.error(e);
      showToast("Connexion impossible, réessayez.");
    }
  }

  function getEffectiveValue(row, fieldKey){
    var ov = state.overrides[row.id];
    if(ov && Object.prototype.hasOwnProperty.call(ov, fieldKey)){
      return ov[fieldKey]; // could be null meaning cleared
    }
    return row[fieldKey];
  }

  // =========================================================
  // ACTIONS
  // =========================================================
  function showToast(msg){
    state.toast = msg;
    render();
    setTimeout(function(){ state.toast = null; render(); }, 2400);
  }

  function takeSlot(rowId, fieldKey, label){
    if(!state.currentUser){
      showToast("Choisissez d'abord votre nom en haut de page.");
      return;
    }
    if(!state.overrides[rowId]) state.overrides[rowId] = {};
    state.overrides[rowId][fieldKey] = state.currentUser;
    saveOverrides();
    showToast("Inscrit comme " + label + ".");
    render();
  }

  function releaseSlot(rowId, fieldKey, currentValue){
    // Une personne ne peut libérer que sa propre case (vérifié aussi côté affichage).
    if(!state.currentUser || currentValue !== state.currentUser) return;
    if(!state.overrides[rowId]) state.overrides[rowId] = {};
    state.overrides[rowId][fieldKey] = null;
    saveOverrides();
    showToast("Votre inscription a été retirée.");
    render();
  }

  function adminSetSlot(rowId, fieldKey, value){
    if(!state.overrides[rowId]) state.overrides[rowId] = {};
    if(value === '' || value == null){
      state.overrides[rowId][fieldKey] = null;
    } else {
      state.overrides[rowId][fieldKey] = value;
    }
    saveOverrides();
    showToast(value ? "Inscription mise à jour." : "Case libérée.");
    render();
  }

  function tryAdminLogin(){
    if(state.adminCodeInput.trim() === ADMIN_CODE){
      state.isAdmin = true;
      state.showLoginAdmin = false;
      state.adminCodeInput = '';
      state.adminError = '';
      render();
    } else {
      state.adminError = 'Code incorrect.';
      render();
    }
  }

  function openNewPersonForm(){
    state.managePersonEditing = '__new__';

      nom: '', groupe: 'UNION',
      predication: false, presidenceCulte: false, presidenceSainteCene: false,
      distributionSainteCene: false, collecteOffrandes: false
    };
    render();
  }

  function openEditPersonForm(nom){
    var p = byName(nom);
    if(!p) return;
    state.managePersonEditing = nom;
    state.manageForm = {
      nom: p.nom, nomOriginal: p.nom, groupe: p.groupe,
      predication: !!p.predication, presidenceCulte: !!p.presidenceCulte,
      presidenceSainteCene: !!p.presidenceSainteCene,
      distributionSainteCene: !!p.distributionSainteCene, collecteOffrandes: !!p.collecteOffrandes
    };
    render();
  }

  function closePersonForm(){
    state.managePersonEditing = null;
    state.manageForm = null;

  }

  function savePersonForm(){
    var f = state.manageForm;
    var nom = (f.nom || '').trim();
    if(!nom){ showToast("Merci de saisir un nom."); return; }
    var isNew = state.managePersonEditing === '__new__';
    if(isNew && byName(nom)){ showToast("Ce nom existe déjà dans la liste."); return; }

    var nomOriginal = f.nomOriginal || nom;
    var nomChange = !isNew && nom !== nomOriginal;
    if(nomChange && byName(nom)){ showToast("Ce nom existe déjà — choisissez un nom différent."); return; }

    var record = {
      nom: nom, groupe: f.groupe,
      predication: !!f.predication, presidenceCulte: !!f.presidenceCulte,
      presidenceSainteCene: !!f.presidenceSainteCene,
      distributionSainteCene: !!f.distributionSainteCene, collecteOffrandes: !!f.collecteOffrandes
    };

    if(!state.intervenantsOverrides) state.intervenantsOverrides = {};

    var countMigrated = 0;
    if(nomChange){
      delete state.intervenantsOverrides[nomOriginal];
      state.intervenantsOverrides['__deleted__' + nomOriginal] = { __deleted: true, nom: nomOriginal };
      Object.keys(state.overrides).forEach(function(rowId){
        var row = state.overrides[rowId]; if(!row) return;
        Object.keys(row).forEach(function(k){
          if(row[k] === nomOriginal){ row[k] = nom; countMigrated++; }
        });
      });
      if(countMigrated > 0) saveOverrides();
    }

    state.intervenantsOverrides[nom] = record;
    saveIntervenantsOverrides();

    if(isNew) showToast("Intervenant ajouté.");
    else if(nomChange) showToast("Nom corrigé" + (countMigrated > 0 ? " — " + countMigrated + " inscription(s) mise(s) à jour." : " — aucune inscription à migrer."));
    else showToast("Habilitations mises à jour.");
    closePersonForm();
  }

  // =========================================================
  // RENDER HELPERS
  // =========================================================
  function el(tag, attrs, children){
    var node = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function(k){
      var v = attrs[k];
      if(k === 'class') node.className = v;
      else if(k === 'html') node.innerHTML = v;
      else if(k.indexOf('on') === 0 && typeof v === 'function') node.addEventListener(k.slice(2), v);
      else if(k === 'disabled') { if(v) node.setAttribute('disabled','disabled'); }
      else if(k === 'checked') { node.checked = !!v; if(v) node.setAttribute('checked','checked'); }
      else if(k === 'selected') { if(v) node.setAttribute('selected','selected'); }
      else if(k === 'style') node.setAttribute('style', v);
      else if(v == null) { /* skip null/undefined attrs */ }
      else node.setAttribute(k, v);
    });
    (children||[]).forEach(function(c){
      if(c == null) return;
      if(typeof c === 'string') node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    });
    return node;
  }


  // ─── Barre navigation mois ──────────────────────────────────────────────
  var MOIS_NAV = ['Janvier','Février','Mars','Avril','Mai','Juin',
                  'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  function renderMonthNav(){
    var btns = MOIS_NAV.map(function(m, idx){
      return el('button', {class:'month-nav-btn', onclick:function(){
        var anchor = document.getElementById('month-anchor-' + idx);
        if(anchor){
          var topbar  = document.querySelector('.topbar');
          var whoami  = document.querySelector('.whoami, .admin-banner');
          var mnav    = document.querySelector('.month-nav');
          var offset  = (topbar  ? topbar.offsetHeight  : 52)
                      + (whoami  ? whoami.offsetHeight   : 50)
                      + (mnav    ? mnav.offsetHeight     : 36)
                      + 8;
          var top = anchor.getBoundingClientRect().top + window.pageYOffset - offset;
          window.scrollTo({top: top, behavior: 'smooth'});
        }
      }}, [m]);
    });
    return el('div', {class:'month-nav'}, btns);
  }

  function renderTopbar(){
    var actions = [];

    if(state.isAdmin){
      actions.push(el('button', {class:'pill-btn', onclick:function(){ state.showManageIntervenants = true; render(); }}, ['Gérer les intervenants']));
      actions.push(el('button', {class:'pill-btn', onclick:function(){ state.isAdmin=false; render(); }}, ['Quitter le mode admin']));
    } else {
      actions.push(el('button', {class:'pill-btn ghost', onclick:function(){ state.showLoginAdmin = true; state.adminError=''; render(); }}, ['Administrateur']));
    }

    return el('div', {class:'topbar'}, [
      el('div', {class:'brand'}, [
        el('div', {class:'mark'}, ['C']),
        el('div', {class:'brand-text'}, [
          el('span', {class:'t1'}, ['Planning des cultes']),
          el('span', {class:'t2'}, ['Année 2026 — inscriptions des intervenants'])
        ])
      ]),
      el('div', {class:'topbar-actions'}, actions)
    ]);
  }

  function renderWhoAmI(){
    if(state.isAdmin){
      return el('div', {class:'admin-banner'}, [
        el('span', {}, [el('b',{},['Mode administrateur']), ' — vous pouvez modifier ou libérer n\u2019importe quelle case.'])
      ]);
    }

    if(state.currentUser){
      var initials = state.currentUser.split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
      return el('div', {class:'whoami'}, [
        el('span', {class:'label'}, ['Vous êtes :']),
        el('span', {class:'you-badge'}, [
          el('span', {class:'avatar'}, [initials]),
          state.currentUser,
          el('button', {title:'Changer', onclick:function(){ state.currentUser = null; render(); }}, ['✕'])
        ])
      ]);
    }

    var select = el('select', {class:'name-select', onchange:function(e){
      state.currentUser = e.target.value || null;
      render();
    }}, [el('option', {value:''}, ['— Choisissez votre nom —'])].concat(
      getNamesSorted().map(function(n){ return el('option', {value:n}, [n]); })
    ));

    return el('div', {class:'whoami'}, [
      el('span', {class:'label'}, ['Qui êtes-vous ?']),
      select
    ]);
  }

  function renderLegend(){
    return el('div', {class:'legend-row'}, [
      el('span', {class:'legend-item'}, [el('span',{class:'dot', style:'background:var(--terracotta)'}), 'Sainte-Cène']),
      el('span', {class:'legend-item'}, [el('span',{class:'dot', style:'background:var(--denim)'}), 'Culte']),
      el('span', {class:'legend-item'}, [el('span',{class:'dot', style:'background:var(--sage)'}), 'Petit-déjeuner'])
    ]);
  }

  function slotEligible(person, slotDef){
    if(!person) return false;
    if(!person[slotDef.perm]) return false;
    // Pour les rubriques de distribution/collecte (propres à chaque église),
    // l'intervenant doit appartenir au même groupe (UNION ou BAPTISTE).
    // Prédicateur / Président du culte / Président Sainte-Cène restent communs.
    if(slotDef.group && person.groupe !== slotDef.group) return false;
    return true;
  }

  function renderSlot(row, def){
    var rawVal = row[def.key];
    var jeunesLocked = rawVal === 'Jeunes';
    var value = getEffectiveValue(row, def.key);
    var hasValue = value != null && value !== '' && value !== '-----';
    var mine = hasValue && state.currentUser && value === state.currentUser;

    var slotClasses = 'slot' + (hasValue ? ' locked' : ' empty') + (mine ? ' mine' : '');

    var valueNode = el('span', {class:'slot-value'}, [hasValue ? value : 'À pourvoir']);

    var actionNode;
    if(state.isAdmin){
      var sel = el('select', {class:'admin-select', onchange:function(e){
        adminSetSlot(row.id, def.key, e.target.value);
      }}, [el('option',{value:''},['— vide —'])].concat(
        getNamesSorted().map(function(n){
          var opt = el('option', {value:n}, [n]);
          if(n === value) opt.setAttribute('selected','selected');
          return opt;
        })
      ));
      actionNode = sel;
    } else if(jeunesLocked){
      actionNode = el('span', {class:'lock-icon'}, ['🔒']);
    } else if(hasValue && mine){
      // L'intervenant peut retirer sa propre inscription, et personne d'autre.
      actionNode = el('button', {
        class:'btn-clear',
        onclick: function(){ releaseSlot(row.id, def.key, value); }
      }, ['Retirer mon inscription']);
    } else if(hasValue){
      actionNode = el('span', {class:'lock-icon'}, ['🔒']);
    } else {
      var person = state.currentUser ? byName(state.currentUser) : null;
      var eligible = slotEligible(person, def);
      actionNode = el('button', {
        class:'btn-take',
        disabled: !state.currentUser || !eligible,
        title: !state.currentUser ? 'Choisissez votre nom' : (!eligible ? 'Vous n\u2019êtes pas habilité pour cette rubrique' : ''),
        onclick: function(){ takeSlot(row.id, def.key, def.label); }
      }, [state.currentUser && !eligible ? 'Non habilité' : 'Je m\u2019inscris']);
    }

    return el('div', {class:slotClasses}, [
      el('span', {class:'slot-label'}, [def.label]),
      valueNode,
      el('span', {class:'slot-action'}, [actionNode])
    ]);
  }

  function renderCard(row, occurrence){
    var ct = cardType(row);
    var d = dateFR(row.date);
    var slotsContainer = el('div', {class:'slots'}, []);

    ['predicateur','presidentCulte'].forEach(function(key){
      var def = SLOT_DEFS.filter(function(s){return s.key===key;})[0];
      slotsContainer.appendChild(renderSlot(row, def));
    });

    if(row.hasSainteCene){
      slotsContainer.appendChild(el('div', {class:'slot-group-title'}, ['Sainte-Cène']));
      var scDef = SLOT_DEFS.filter(function(s){return s.key==='presidentSainteCene';})[0];
      slotsContainer.appendChild(renderSlot(row, scDef));

      slotsContainer.appendChild(el('div', {class:'slot-group-title'}, ['Union — distribution Sainte-Cène']));
      ['unionDist1','unionDist2'].forEach(function(key){
        var def = SLOT_DEFS.filter(function(s){return s.key===key;})[0];
        slotsContainer.appendChild(renderSlot(row, def));
      });

      slotsContainer.appendChild(el('div', {class:'slot-group-title'}, ['Baptiste — distribution Sainte-Cène']));
      ['baptisteDist1','baptisteDist2'].forEach(function(key){
        var def = SLOT_DEFS.filter(function(s){return s.key===key;})[0];
        slotsContainer.appendChild(renderSlot(row, def));
      });
    }

    // Collecte des offrandes : tous les dimanches, pour les deux églises
    slotsContainer.appendChild(el('div', {class:'slot-group-title'}, ['Union — collecte offrandes']));
    ['unionCollecte1','unionCollecte2'].forEach(function(key){
      var def = SLOT_DEFS.filter(function(s){return s.key===key;})[0];
      slotsContainer.appendChild(renderSlot(row, def));
    });

    slotsContainer.appendChild(el('div', {class:'slot-group-title'}, ['Baptiste — collecte offrandes']));
    ['baptisteCollecte1','baptisteCollecte2'].forEach(function(key){
      var def = SLOT_DEFS.filter(function(s){return s.key===key;})[0];
      slotsContainer.appendChild(renderSlot(row, def));
    });

    var topChildren = [
      el('div', {class:'date-block'}, [
        el('span', {class:'date-main'}, [d.dayLabel.charAt(0).toUpperCase()+d.dayLabel.slice(1)+' '+d.full]),
        el('span', {class:'date-sub'}, [d.year + (row.typeCulte === 'Petit-déjeuner' ? ' · petit-déjeuner partagé' : '') + (occurrence>1 ? ' · 2ᵉ intervenant ce jour' : '')])
      ]),
      el('span', {class:'type-badge '+ct.cls}, [ct.label])
    ];

    var bodyChildren = [el('div', {class:'card-top'}, topChildren)];
    if(row.remarques){
      bodyChildren.push(el('div', {class:'remark'}, ['Remarque : ' + row.remarques]));
    }
    bodyChildren.push(slotsContainer);

    return el('div', {class:'card'}, [
      el('div', {class:'stripe '+ct.cls}),
      el('div', {class:'card-body'}, bodyChildren)
    ]);
  }

  function renderMain(){
    var main = el('div', {class:'main'}, []);
    main.appendChild(renderLegend());

    var lastMonth = null;
    var lastDate = null;
    var dateOccurrence = 0;
    PLANNING_RAW.forEach(function(row){
      if(row.mois && row.mois !== lastMonth){
        lastMonth = row.mois;
        var mIdx = MOIS_NAV.indexOf(lastMonth);
        if(mIdx >= 0){
          main.appendChild(el('div', {id:'month-anchor-'+mIdx, class:'month-anchor'}, []));
        }
        var countInMonth = PLANNING_RAW.filter(function(r){return r.mois===lastMonth;}).length;
        main.appendChild(el('div', {class:'month-header'}, [
          lastMonth,
          el('span', {class:'count'}, [countInMonth + ' dimanche' + (countInMonth>1?'s':'')])
        ]));
      }
      if(row.date === lastDate){ dateOccurrence++; } else { dateOccurrence = 1; lastDate = row.date; }
      main.appendChild(renderCard(row, dateOccurrence));
    });

    return main;
  }

  function renderAdminModal(){
    if(!state.showLoginAdmin) return null;
    var input;
    var overlay = el('div', {class:'overlay', onclick:function(e){ if(e.target===overlay){ state.showLoginAdmin=false; render(); } }}, [
      el('div', {class:'modal'}, [
        el('h2', {}, ['Accès administrateur']),
        el('p', {}, ['Saisissez le code pour modifier ou libérer une inscription.']),
        (input = el('input', {type:'password', placeholder:'Code administrateur', value:state.adminCodeInput, oninput:function(e){ state.adminCodeInput = e.target.value; }})),
        state.adminError ? el('div', {class:'err-msg'}, [state.adminError]) : null,
        el('div', {class:'modal-actions'}, [
          el('button', {class:'pill-btn ghost', onclick:function(){ state.showLoginAdmin=false; render(); }}, ['Annuler']),
          el('button', {class:'pill-btn admin', onclick:tryAdminLogin}, ['Entrer'])
        ])
      ])
    ]);
    setTimeout(function(){
      input.addEventListener('keydown', function(e){ if(e.key==='Enter') tryAdminLogin(); });
      input.focus();
    }, 0);
    return overlay;
  }

  var PERM_LABELS = {
    predication: 'Prédicateur',
    presidenceCulte: 'Président du culte',
    presidenceSainteCene: 'Président Sainte-Cène',
    distributionSainteCene: 'Distribution Sainte-Cène',
    collecteOffrandes: 'Collecte offrandes'
  };

  function renderPersonForm(){
    var f = state.manageForm;
    var isNew = state.managePersonEditing === '__new__';
    var nomInput;

    var checkboxes = PERM_FIELDS.map(function(field){
      return el('label', {class:'perm-row'}, [
        el('input', {type:'checkbox', checked: !!f[field], onchange:function(e){
          f[field] = e.target.checked;
        }}),
        el('span', {}, [PERM_LABELS[field]])
      ]);
    });

    var groupeSelect = el('select', {class:'admin-select', onchange:function(e){ f.groupe = e.target.value; }}, [
      el('option', {value:'UNION', selected: f.groupe==='UNION'}, ['UNION']),
      el('option', {value:'BAPTISTE', selected: f.groupe==='BAPTISTE'}, ['BAPTISTE'])
    ]);

    return el('div', {class:'modal'}, [
      el('h2', {}, [isNew ? 'Ajouter un intervenant' : 'Modifier — ' + (f.nomOriginal || f.nom)]),
      el('p', {}, [isNew
        ? 'Renseignez le nom, l\u2019église et les rubriques auxquelles cette personne sera habilitée à s\u2019inscrire.'
        : 'Cochez ou décochez les rubriques auxquelles ' + f.nom + ' est habilité(e) à s\u2019inscrire.']),
      el('label', {class:'field-label'}, ['Nom et prénom']),
      isNew
        ? (nomInput = el('input', {type:'text', placeholder:'Ex. Marie Dupont', value:f.nom, oninput:function(e){ f.nom = e.target.value; }}))
        : el('div', {}, [
            el('input', {type:'text', value:f.nom, oninput:function(e){ f.nom = e.target.value; }}),
            el('p', {style:'font-size:11.5px;color:var(--ink-soft);margin:4px 0 0;'},
              ['⚠️ Corriger ce nom met à jour toutes les inscriptions existantes.'])
          ]),
      el('label', {class:'field-label'}, ['Église']),
      groupeSelect,
      el('label', {class:'field-label'}, ['Habilitations']),
      el('div', {class:'perm-list'}, checkboxes),
      el('div', {class:'modal-actions'}, [
        el('button', {class:'pill-btn ghost', onclick:closePersonForm}, ['Annuler']),
        el('button', {class:'pill-btn admin', onclick:savePersonForm}, [isNew ? 'Ajouter' : 'Enregistrer'])
      ])
    ]);
  }

  function renderManageIntervenantsModal(){
    if(!state.showManageIntervenants) return null;

    if(state.managePersonEditing){
      var overlay1 = el('div', {class:'overlay', onclick:function(e){ if(e.target===overlay1){ closePersonForm(); } }}, [
        renderPersonForm()
      ]);
      return overlay1;
    }

    var list = getEffectiveIntervenants().filter(function(p){
      return p && p.nom && typeof p.nom === 'string';
    }).slice().sort(function(a,b){
      return a.nom.localeCompare(b.nom, 'fr', {sensitivity:'base'});
    });

    var rows = list.map(function(p){
      var permsActive = PERM_FIELDS.filter(function(f){ return p[f]; }).map(function(f){ return PERM_LABELS[f]; });
      return el('div', {class:'person-row'}, [
        el('div', {class:'person-info'}, [
          el('div', {class:'person-name'}, [p.nom]),
          el('div', {class:'person-meta'}, [p.groupe + (permsActive.length ? ' · ' + permsActive.join(', ') : ' · aucune habilitation')])
        ]),
        el('button', {class:'pill-btn ghost small', onclick:function(){ openEditPersonForm(p.nom); }}, ['Modifier'])
      ]);
    });

    var overlay = el('div', {class:'overlay', onclick:function(e){ if(e.target===overlay){ state.showManageIntervenants=false; render(); } }}, [
      el('div', {class:'modal modal-wide'}, [
        el('div', {class:'modal-header-row'}, [
          el('h2', {}, ['Gérer les intervenants']),
          el('button', {class:'pill-btn admin small', onclick:openNewPersonForm}, ['+ Ajouter un intervenant'])
        ]),
        el('p', {}, ['Modifiez les habilitations d\u2019un intervenant existant, ou ajoutez une nouvelle personne à la liste.']),
        el('div', {class:'person-list'}, rows),
        el('div', {class:'modal-actions'}, [
          el('button', {class:'pill-btn', onclick:function(){ state.showManageIntervenants=false; render(); }}, ['Fermer'])
        ])
      ])
    ]);
    return overlay;
  }

  function renderToast(){
    if(!state.toast) return null;
    return el('div', {class:'toast'}, [state.toast]);
  }

  function render(){
    var root = document.getElementById('root');
    root.innerHTML = '';
    root.appendChild(renderTopbar());

    if(state.configMissing){
      root.appendChild(el('div', {class:'empty-state'}, [
        el('div', {class:'display'}, ['Connexion à la base de données impossible']),
        el('p', {style:'max-width:420px; margin:10px auto 0; font-size:13.5px; line-height:1.6;'}, [
          'Soit ce fichier n\u2019est pas encore relié à un projet Firebase (ouvrez le fichier dans un éditeur de texte et complétez le bloc "CONFIGURATION FIREBASE"), soit la connexion réseau a échoué. Vérifiez votre connexion et rechargez la page.'
        ])
      ]));
      return;
    }

    root.appendChild(renderWhoAmI());
    root.appendChild(renderMonthNav());

    if(state.loading){
      root.appendChild(el('div', {class:'empty-state'}, [
        el('div', {class:'display'}, ['Chargement du planning…'])
      ]));
    } else {
      root.appendChild(renderMain());
      root.appendChild(el('div', {class:'footer-note'}, [
        'Les inscriptions sont partagées en temps réel entre tous les intervenants. Chacun peut modifier ou retirer sa propre inscription à tout moment ; un administrateur peut modifier toutes les cases.'
      ]));
    }

    var modal = renderAdminModal();
    if(modal) root.appendChild(modal);
    var manageModal = renderManageIntervenantsModal();
    if(manageModal) root.appendChild(manageModal);
    var toast = renderToast();
    if(toast) root.appendChild(toast);
  }

  function bootstrapApp(){
    if (window.__FIREBASE_CONFIG_MISSING__) {
      state.loading = false;
      state.configMissing = true;
      render();
      return;
    }
    render();
    loadOverrides();
  }

  var bootstrapped = false;
  function bootstrapOnce(){
    if (bootstrapped) return;
    bootstrapped = true;
    bootstrapApp();
  }

  if (window.__FIREBASE_READY__ || window.__FIREBASE_CONFIG_MISSING__) {
    bootstrapOnce();
  } else {
    window.addEventListener('firebase-ready', bootstrapOnce, { once:true });
    // Filet de sécurité : si le module Firebase ne se charge pas du tout
    // (URL bloquée, pas de réseau, erreur de configuration), on affiche
    // un message clair plutôt que de laisser la page vide indéfiniment.
    setTimeout(function(){
      if (!bootstrapped) {
        window.__FIREBASE_CONFIG_MISSING__ = true;
        bootstrapOnce();
      }
    }, 4000);
  }

})();
</script>
